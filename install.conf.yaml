- defaults:
    link:
      create: true
      force: true
- link:
    ~/.config/opencode:
      glob: true
      exclude:
        - opencode/.gitignore
        - opencode/bun.lock
        - opencode/node_modules/**
        - opencode/package-lock.json
        - opencode/package.json
        - opencode/skills/**
      path: opencode/**/*
    ~/.claude/CLAUDE.md: opencode/AGENTS.md
    ~/.claude/skills/:
      glob: true
      path: opencode/skills/*
    ~/.agents/skills/:
      glob: true
      path: opencode/skills/*
    ~/.local/bin/:
      glob: true
      path: bin/*
    ~/.config/git-quick-commit/config.json: git-quick-commit/config.json
    ~/.config/git-quick-commit/PROMPT.md: git-quick-commit/PROMPT.md
    ~/.config/vicinae/settings.json: vicinae-config.jsonc
