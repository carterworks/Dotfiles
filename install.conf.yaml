- defaults:
    link:
      create: true
      force: true
- link:
    ~/.config/opencode:
      glob: true
      exclude:
        - opencode/skills/**
      path: opencode/**/*
    ~/.claude/CLAUDE.md: opencode/AGENTS.md
    ~/.claude/commands/:
      glob: true
      path: opencode/command/*
    ~/.claude/skills/:
      glob: true
      path: opencode/skills/*
    ~/.agents/skills/:
      glob: true
      path: opencode/skills/*
    ~/.local/bin/:
      glob: true
      path: bin/*
    ~/.config/vicinae/settings.json: vicinae-config.jsonc
