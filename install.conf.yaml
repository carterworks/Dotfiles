- clean:
    ~/: {}
    ~/.claude/skills:
        recursive: true
    ~/.agents/skills:
        recursive: true
- defaults:
    link:
        create: true
        force: true
- link:

    ~/.config/hypr:
        glob: true
        path: hypr/*
    ~/.config/ashell/config.toml: ashell-config.toml
    ~/.config/nvim: nvim/
    ~/.config/fish/fish_plugins: fish/fish_plugins
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/completions:
        glob: true
        path: fish/completions/*
    ~/.config/opencode:
        glob: true
        path: opencode/**/*
    ~/.claude/CLAUDE.md: opencode/AGENTS.md
    ~/.claude/commands/:
        glob: true
        path: opencode/command/*
    ~/.claude/skills/:
        glob: true
        path: opencode/skills/*
    ~/.codex/AGENTS.md: opencode/AGENTS.md
    ~/.codex/prompts/:
        glob: true
        path: opencode/command/*
    ~/.agents/skills/:
        glob: true
        path: opencode/skills/*

    ~/.config/helix:
        glob: true
        path: helix/**/*

    ~/.local/bin/:
        glob: true
        path: bin/*
    ~/.config/zed/settings.json: zed-settings.json
    ~/.config/mako/config: mako-config
    ~/.config/vicinae/settings.json: vicinae-config.jsonc
