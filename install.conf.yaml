- defaults:
    link:
      create: true
      force: true
- link:
    ~/.config/opencode/skills/:
      glob: true
      path: agents/skills/*
    ~/.config/opencode/opencode.jsonc: agents/opencode.jsonc
    ~/.claude/CLAUDE.md: agents/AGENTS.md
    ~/.claude/skills/:
      glob: true
      path: agents/skills/*
    ~/.local/bin/:
      glob: true
      path: bin/*
    ~/.config/git-quick-commit/config.json: git-quick-commit/config.json
    ~/.config/git-quick-commit/PROMPT.md: git-quick-commit/PROMPT.md
    ~/.config/vicinae/settings.json: vicinae-config.jsonc
